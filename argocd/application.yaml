apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cicd-pipeline
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/theharish05/cicd-pipeline.git
    targetRevision: main
    path: helm/cicd-pipeline

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
